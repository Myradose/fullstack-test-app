services:
  user-api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    volumes:
      - ./api/UserApi:/app
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:5000", "--no-launch-profile"]
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ASPNETCORE_ENVIRONMENT=Development

  product-api:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /app
    volumes:
      - ./api/ProductApi:/app
    command: ["dotnet", "watch", "run", "--urls", "http://0.0.0.0:5001", "--no-launch-profile"]
    environment:
      - DOTNET_USE_POLLING_FILE_WATCHER=true
      - ASPNETCORE_ENVIRONMENT=Development

  fullstack-ui:
    image: node:lts-alpine
    working_dir: /app
    volumes:
      - ./ui:/app
    command: ["npm", "run", "start"]
    ports:
      - "4200:4200"
    environment:
      - NODE_ENV=development
    entrypoint: ["/bin/sh", "-c", "npm install -g @angular/cli && npm install && npm run start"]

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fullstack-sqlserver
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password123!
      - MSSQL_PID=Express
    volumes:
      - sqlserver-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -C -Q 'SELECT 1'"]
      interval: 10s
      retries: 10
      start_period: 10s
      timeout: 3s

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./db/init:/scripts
    environment:
      - ACCEPT_EULA=Y
    command: >
      bash -c "
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'Password123!' -C -i /scripts/01-create-database.sql &&
        echo 'Database initialization completed'
      "
    restart: "no"

  api-gateway:
    image: nginx:alpine
    container_name: fullstack-gateway
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    depends_on:
      - product-api
      - user-api
      - sqlserver

volumes:
  sqlserver-data:
