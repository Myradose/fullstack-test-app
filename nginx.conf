events {
    worker_connections 1024;
}

http {
    upstream userapi {
        server user-api:5000;
    }
    
    upstream productapi {
        server product-api:5001;
    }

    server {
        listen 80;
        server_name localhost;

        # Handle preflight requests for all API endpoints
        location ~ ^/api/(users|products).*$ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Add CORS headers for actual requests
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With' always;

            # Route to appropriate API based on path
            if ($uri ~ ^/api/users) {
                proxy_pass http://userapi;
            }
            if ($uri ~ ^/api/products) {
                proxy_pass http://productapi;
            }

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            return 200 'API Gateway is healthy';
            add_header Content-Type text/plain;
        }
    }
}
